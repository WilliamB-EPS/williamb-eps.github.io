    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div id="nav" class="overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="overlay-content">
            <a href="index.html">Home</a>

    <div class="header">
        <div class="menu" onclick="openNav()">
            <div class="bar1"></div>
            <div class="bar2"></div>
        </div>
        <div class="name">William Bowers</div>
    </div>

    <div class="contact-photo">
        <div class="title-page-container">
            <h1>Contact Me</h1>
            <p>Social media icons will go here</p>
            <p>Email and phone number will go here</p>
        </div>
    </div>

    <div class="contact-box">
        <h2 style="margin:0; text-align: center;">Send me a Message!</h2>
        <form action="ADD ENDPOINT HEEX" method="POST" enctype="multipart/form-data">
            <label for="name">Full name</label>
            <input type="text" id="name" name="name" placeholder="First and last name..">

            <label for="country">Country</label>
            <select id="country" name="country">
              <option value="australia">Australia</option>
              <option value="canada">Canada</option>
              <option value="usa">USA</option>
            </select>

            <label for="email">Email Address</label>
            <input type="text" id="email" name="email" placeholder="youremail@example.com...">
        
            <label for="subject">Subject</label>
            <textarea id="subject" name="subject" placeholder="Write something.." style="height:200px"></textarea>
        
            <input style="text-align: center" type="submit" value="Submit">
          </form>
    </div>
    
    <div class="footer">
        <div class="footer-left">

            <p style="margin-left: 0.5vw; font-size: 1.1vw">William Bowers 2022 &copy; </p>
        </div>
        <div class="footer-right"> 
            <a href="#"><i class="fa fa-instagram fa-2x"></i></a>
            <a href="#"><i class="fa fa-google fa-2x"></i></a>
            <a href="#"><i class="fa fa-linkedin fa-2x"></i></a>
            <a href="#"><i class="fa fa-github fa-2x"></i></a>
        </div>
    </div>

    <script>
        function openNav() {
            document.getElementById("nav").style.width = "100%";
        }
        
        function closeNav() {
            document.getElementById("nav").style.width = "0%";
        }
    </script>
</body>
